<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>毒キノコ狩り 🍄</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0d2b0d;
  font-family: 'Segoe UI', Arial, sans-serif;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  color: #ecf0f1;
}

/* ===== HEADER ===== */
#header {
  width: 100%;
  max-width: 720px;
  display: none;
  justify-content: space-around;
  align-items: center;
  padding: 8px 16px;
  background: rgba(0,0,0,0.5);
  border-bottom: 2px solid #27ae60;
  flex-shrink: 0;
}

.stat-box { text-align: center; }
.stat-label { font-size: 10px; color: #95a5a6; text-transform: uppercase; letter-spacing: 1px; }
.stat-value { font-size: 20px; font-weight: bold; color: #f1c40f; }
#lives-display { font-size: 20px; }

/* ===== TIMER BAR ===== */
#timer-bar-wrap {
  width: 100%;
  max-width: 720px;
  height: 8px;
  background: #1a3a1a;
  display: none;
  flex-shrink: 0;
}
#timer-bar {
  height: 100%;
  width: 100%;
  background: #2ecc71;
  transition: width 1s linear, background 0.5s;
}

/* ===== GAME FIELD ===== */
#game-field {
  position: relative;
  width: 100%;
  max-width: 720px;
  flex: 1;
  background: linear-gradient(to bottom, #1a4a1a 50%, #2d6a1d 85%, #3a1e08 100%);
  overflow: hidden;
}

/* ===== OVERLAYS ===== */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  background: rgba(0,0,0,0.88);
  text-align: center;
  padding: 24px;
}
.overlay.hidden { display: none; }

.overlay h1 { font-size: 2.6em; margin-bottom: 16px; }
.overlay h2 { font-size: 1.6em; margin-bottom: 12px; }
.overlay p  { font-size: 1.05em; line-height: 1.7; color: #bdc3c7; margin-bottom: 10px; }

.btn {
  background: #27ae60;
  color: #fff;
  border: none;
  padding: 13px 38px;
  font-size: 1.15em;
  border-radius: 30px;
  cursor: pointer;
  margin-top: 14px;
  transition: transform 0.1s, background 0.2s;
}
.btn:hover  { background: #2ecc71; transform: scale(1.05); }
.btn:active { transform: scale(0.96); }

/* ===== START SCREEN ===== */
#start-overlay h1 { color: #e74c3c; text-shadow: 0 0 24px rgba(231,76,60,0.5); }

/* ===== HINT SCREEN ===== */
#hint-overlay h2 { color: #f39c12; }
#hint-mushroom-wrap { margin: 12px auto; }
#hint-label { color: #f39c12; font-size: 1.05em; margin-top: 6px; }
#hint-countdown { font-size: 2.8em; color: #e74c3c; margin-top: 14px; font-weight: bold; }

/* ===== LEVEL UP SCREEN ===== */
#levelup-overlay h2 { font-size: 2.8em; color: #f1c40f; animation: bounce 0.5s; }
#levelup-msg { font-size: 1.1em; color: #ecf0f1; }

/* ===== GAME OVER ===== */
#gameover-overlay h1 { color: #e74c3c; }
.final-score { font-size: 2.2em; color: #f1c40f; margin: 14px 0; }

/* ===== MUSHROOM ===== */
.mushroom {
  position: absolute;
  cursor: pointer;
  transform-origin: bottom center;
  z-index: 10;
  user-select: none;
  transition: transform 0.15s;
}
.mushroom:hover { transform: scale(1.12); }
.mushroom:active { transform: scale(0.93); }
.mushroom.popping { animation: pop 0.3s forwards; pointer-events: none; }
.mushroom.wrong   { animation: shake 0.4s; }

@keyframes pop {
  0%   { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(0);   opacity: 0; }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%     { transform: translateX(-10px); }
  75%     { transform: translateX(10px); }
}
@keyframes appear {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
@keyframes bounce {
  0%,100% { transform: scale(1); }
  50%     { transform: scale(1.25); }
}

/* ===== FEEDBACK TEXT ===== */
.feedback {
  position: absolute;
  font-size: 1.3em;
  font-weight: bold;
  pointer-events: none;
  animation: rise 0.9s forwards;
  z-index: 100;
  white-space: nowrap;
}
@keyframes rise {
  0%   { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-70px); }
}

/* ===== TIME WARNING ===== */
#timer-bar.warn { background: #e74c3c !important; animation: blink 0.5s infinite alternate; }
@keyframes blink { from { opacity: 1; } to { opacity: 0.4; } }

/* ===== MISS FLASH & LIFE BANNER ===== */
#miss-flash {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 150;
}
@keyframes missflash {
  0%   { background: rgba(231,76,60,0.55); }
  100% { background: rgba(231,76,60,0); }
}
#miss-flash.active { animation: missflash 0.6s forwards; }

#life-banner {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(140,0,0,0.93); color: #fff;
  padding: 9px 26px; border-radius: 24px;
  font-size: 1.2em; font-weight: bold;
  pointer-events: none; z-index: 160; white-space: nowrap;
  display: none;
}
@keyframes bannerPop {
  0%   { opacity: 0; transform: translateX(-50%) scale(0.75); }
  15%  { opacity: 1; transform: translateX(-50%) scale(1.08); }
  28%  { transform: translateX(-50%) scale(1); }
  72%  { opacity: 1; }
  100% { opacity: 0; transform: translateX(-50%) scale(0.95); }
}
#life-banner.show { display: block; animation: bannerPop 1.5s forwards; }
</style>
</head>
<body>

<div id="header">

// Lv10以降: Lv9ベースでラウンドごとのmoveSpeedをさらに上げる
function getLvlCfg(level) {
  if (level < LEVELS.length) return LEVELS[level];
  const extra = level - (LEVELS.length - 1);
  const baseLvl = LEVELS[LEVELS.length - 1];
  return {
    ...baseLvl,
    timeLimit: Math.max(10, baseLvl.timeLimit - extra),
    rounds: baseLvl.rounds.map((r, i) => ({
      ...r,
      moveSpeed: 1.1 + extra * 0.25 + i * 0.1,
    })),
  };
}

function resetState() {
  G = { level:0, score:0, lives:3, timeLeft:0, timerId:null,
        mushrooms:[], poisonLeft:0, active:false,
        roundsCompleted:0, animFrame:null, roundCfg:null, mistakesThisLevel:0 };
}

  1:[{l:'42%',t:'25%',s:'20%'}],

};

function buildMushroom(type, size) {
  const s = size || 80;
  const wrap = document.createElement('div');
  wrap.style.cssText = `width:${s}px;display:inline-block;position:relative;`;
  const capW=s, capH=Math.round(s*0.55), stemW=Math.round(s*0.34), stemH=Math.round(s*0.45);

  const cap = document.createElement('div');
  cap.style.cssText = `width:${capW}px;height:${capH}px;background:${type.capColor};border-radius:50% 50% 10% 10%;position:relative;overflow:hidden;box-shadow:inset -4px -6px 10px rgba(0,0,0,0.25);`;

  const layout = SPOT_LAYOUTS[type.spots||0] || [];
  const opacity = type.spotOpacity !== undefined ? type.spotOpacity : 1;
  const rgb = SPOT_RGB[type.spotColor || 'white'];
  for (const pos of layout) {
    const sp = document.createElement('div');
    sp.style.cssText = `position:absolute;left:${pos.l};top:${pos.t};width:${pos.s};height:${pos.s};background:rgba(${rgb},${opacity});border-radius:50%;`;
    cap.appendChild(sp);
  }

  const stemColor = type.stemColor || '#f5f0e0';
  const stem = document.createElement('div');
  stem.style.cssText = `width:${stemW}px;height:${stemH}px;background:${stemColor};border-radius:4px 4px 10px 10px;margin:0 auto;box-shadow:inset -2px 0 4px rgba(0,0,0,0.1);`;

  wrap.appendChild(cap); wrap.appendChild(stem);
  return wrap;
}

// ===== START / RESTART =====
function startGame() {
  resetState();
  header.style.display = 'flex';
  timerWrap.style.display = 'block';
  updateUI();
  doHint();
}
function restartGame() { stopMoving(); clearTimer(); clearMushrooms(); startGame(); }

// ===== HINT PHASE =====
function doHint() {
  clearTimer(); stopMoving(); clearMushrooms();
  G.active = false;
  G.roundsCompleted = 0;
  G.roundCfg = null;
  G.mistakesThisLevel = 0;

  const lvl = getLvlCfg(G.level);
  $('hint-level-num').textContent = G.level + 1;
  const wrap = $('hint-mushroom-wrap');
  wrap.innerHTML = '';
  wrap.appendChild(buildMushroom(lvl.poison, 120));


  let c = 7;
  $('hint-countdown').textContent = '';
  showOnly('hint');
  const iv = setInterval(() => {
    c--;
    if (c <= 0) { clearInterval(iv); showOnly(null); doRound(); }
    else $('hint-countdown').textContent = c <= 3 ? c : '';
  }, 1000);
}

// ===== ROUND START =====
function doRound() {
  clearMushrooms(); stopMoving();
  G.active = true;

  const lvl = getLvlCfg(G.level);
  const r = lvl.rounds[Math.min(G.roundsCompleted, lvl.rounds.length - 1)];
  const poisonous = r.poisonousMin + Math.floor(Math.random() * (r.poisonousMax - r.poisonousMin + 1));
  G.roundCfg = {
    total: r.total, poisonous, edible: r.edible,
    poison: lvl.poison, timeLimit: r.timeLimit || lvl.timeLimit,
    moving: r.moving || false, moveSpeed: r.moveSpeed || 0,
    roundsTotal: lvl.rounds.length,
  };

  const cfg = G.roundCfg;
  G.timeLeft   = cfg.timeLimit;
  G.poisonLeft = cfg.poisonous;
  placeMushrooms(cfg);
  updateUI();
  runTimer(cfg.timeLimit);
  if (cfg.moving) startMoving(cfg.moveSpeed);
}

// ===== PLACE MUSHROOMS =====
function placeMushrooms(cfg) {
  const fw=gameField.clientWidth, fh=gameField.clientHeight;
  const sz=Math.min(80, Math.floor(fw/(cfg.total*0.6+1)));
  const pad=12, groundH=55;
  const types=[];
  for (let i=0;i<cfg.poisonous;i++) types.push({...cfg.poison, isPoisonous:true});
  for (let i=0;i<cfg.total-cfg.poisonous;i++) types.push({...cfg.edible[i%cfg.edible.length], isPoisonous:false});
  types.sort(()=>Math.random()-0.5);
  const placed=[];
  types.forEach((type,idx)=>{
    let x,y,tries=0;
    do {
      x=pad+Math.random()*(fw-sz-pad*2);
      y=pad+Math.random()*(fh-sz-groundH-pad*2);
      tries++;
    } while(tries<80 && placed.some(p=>Math.abs(p.x-x)<sz+8&&Math.abs(p.y-y)<sz+8));
    placed.push({x,y});
    const el=document.createElement('div');
    el.className='mushroom';
    el.style.left=x+'px'; el.style.top=y+'px'; el.style.width=sz+'px';
    el.style.animation=`appear 0.3s ${idx*70}ms both`;
    el.appendChild(buildMushroom(type,sz));
    const m={el,isPoisonous:type.isPoisonous,x,y,sz};
    el.addEventListener('click',()=>onMushroomClick(m));
    gameField.appendChild(el);
    G.mushrooms.push(m);
  });
}

// ===== MOVING MUSHROOMS =====
function startMoving(speed) {
  G.mushrooms.forEach(m=>{
    const a=Math.random()*Math.PI*2;
    m.vx=Math.cos(a)*speed; m.vy=Math.sin(a)*speed;
    m.el.style.transition='none';
  });
  animLoop();
}
function animLoop() {
  if(!G.active) return;
  const fw=gameField.clientWidth, fh=gameField.clientHeight, groundH=55;
  G.mushrooms.forEach(m=>{
    if(m.vx===undefined) return;
    m.x+=m.vx; m.y+=m.vy;
    const maxX=fw-m.sz, maxY=fh-m.sz-groundH;
    if(m.x<0){m.x=0;m.vx*=-1;} if(m.x>maxX){m.x=maxX;m.vx*=-1;}
    if(m.y<0){m.y=0;m.vy*=-1;} if(m.y>maxY){m.y=maxY;m.vy*=-1;}
    m.el.style.left=m.x+'px'; m.el.style.top=m.y+'px';
  });
  G.animFrame=requestAnimationFrame(animLoop);
}
function stopMoving() { if(G.animFrame){cancelAnimationFrame(G.animFrame);G.animFrame=null;} }

// ===== CLICK HANDLER =====
function onMushroomClick(m) {
  if(!G.active||m.el.dataset.done) return;
  m.el.dataset.done='1';
  if(m.isPoisonous) {
    const pts=10*(G.level+1);
    G.score+=pts; G.poisonLeft--;
    m.el.classList.add('popping');
    showFeedback(m.x,m.y,`+${pts}`,'#2ecc71');
    setTimeout(()=>m.el.remove(),300);
    updateUI();
    if(G.poisonLeft<=0){G.active=false;clearTimer();stopMoving();setTimeout(doRoundClear,400);}
  } else {
    m.el.classList.add('wrong');
    showFeedback(m.x,m.y,'💀 ミス！','#e74c3c');
    setTimeout(()=>{delete m.el.dataset.done;m.el.classList.remove('wrong');},420);
    decrementLife();
  }
}

// ===== ROUND CLEAR =====
function doRoundClear() {
  G.roundsCompleted++;
  const roundsTotal = G.roundCfg ? G.roundCfg.roundsTotal : 5;
  if(G.roundsCompleted < roundsTotal) {
    const left=roundsTotal-G.roundsCompleted;
    overlays.levelup.querySelector('h2').textContent='✅ クリア！';
    $('levelup-msg').textContent=`ステージ ${G.roundsCompleted}/${roundsTotal} ｜ あと ${left} 回！`;
    showOnly('levelup');
    setTimeout(()=>{showOnly(null);doRound();},3200);
  } else {
    const bonusLife = G.mistakesThisLevel === 0 && G.lives < 5;
    if(bonusLife) G.lives++;
    G.level++; G.roundsCompleted=0; G.roundCfg=null; G.mistakesThisLevel=0;
    updateUI();
    overlays.levelup.querySelector('h2').textContent = bonusLife ? '⭐ レベルアップ！ ＋❤️' : '⭐ レベルアップ！';
    $('levelup-msg').innerHTML = bonusLife
      ? `🎉 ノーミスクリア！ライフ +1 ボーナス！<br>スコア ${G.score} ｜ レベル ${G.level+1} へ！`
      : `スコア ${G.score} ｜ レベル ${G.level+1} へ！`;
    showOnly('levelup');
    setTimeout(()=>{showOnly(null);doHint();},3800);
  }
}

// ===== LIFE / GAME OVER =====
function decrementLife() {
  G.mistakesThisLevel++;
  G.lives--;
  // 画面フラッシュ
  const fl = $('miss-flash');
  fl.classList.remove('active'); void fl.offsetWidth; fl.classList.add('active');
  // ライフ減バナー
  const bn = $('life-banner');
  bn.textContent = `💀 ライフ -1　残り ❤️ ✕${Math.max(0,G.lives)}`;
  bn.classList.remove('show'); void bn.offsetWidth; bn.classList.add('show');
  updateUI();
  if(G.lives<=0){G.active=false;clearTimer();stopMoving();setTimeout(doGameOver,500);}
}

// ===== TIMER =====
function runTimer(total) {
  timerBar.style.transition='none'; timerBar.style.width='100%'; timerBar.className='';
  void timerBar.offsetWidth;
  timerBar.style.transition='width 1s linear, background 0.4s';
  G.timerId=setInterval(()=>{
    G.timeLeft--;
    $('time-disp').textContent=G.timeLeft;
    const pct=(G.timeLeft/total)*100;
    timerBar.style.width=pct+'%';
    if(pct<25){timerBar.style.background='#e74c3c';timerBar.classList.add('warn');}
    else if(pct<55) timerBar.style.background='#f39c12';
    if(G.timeLeft<=0){
      clearTimer();G.active=false;stopMoving();
      showFeedback(gameField.clientWidth/2-60,gameField.clientHeight/2-40,'⏰ 時間切れ！','#e74c3c');
      decrementLife();
      if(G.lives>0) setTimeout(doHint,1000);
    }
  },1000);
}
function clearTimer(){clearInterval(G.timerId);G.timerId=null;}

// ===== GAME OVER =====
function doGameOver() {
  clearMushrooms();
  $('final-score-val').textContent=G.score;
  $('final-level-val').textContent=G.level+1;
  showOnly('gameover');
}

// ===== FEEDBACK =====
function showFeedback(x,y,text,color) {
  const fb=document.createElement('div');
  fb.className='feedback'; fb.style.left=Math.round(x)+'px'; fb.style.top=Math.round(y)+'px';
  fb.style.color=color; fb.textContent=text;
  gameField.appendChild(fb); setTimeout(()=>fb.remove(),900);
}

// ===== UPDATE UI =====
function updateUI() {
  const cfg=G.roundCfg || {roundsTotal:5};
  $('lvl-disp').textContent   =G.level+1;
  $('score-disp').textContent =G.score;
  $('poison-disp').textContent=G.poisonLeft;
  $('time-disp').textContent  =G.timeLeft>0?G.timeLeft:'--';
  $('stage-disp').textContent =`${G.roundsCompleted+1}/${cfg.roundsTotal}`;
  $('lives-display').textContent=`❤️ ✕${Math.max(0,G.lives)}`;
}

// ===== CLEAR MUSHROOMS =====
function clearMushrooms() {
  G.mushrooms.forEach(m=>m.el.remove()); G.mushrooms=[];
  document.querySelectorAll('.feedback').forEach(f=>f.remove());
}
</script>
</body>
</html>
